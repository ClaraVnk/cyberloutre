<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Loutre">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fbe5d8"/>
      <stop offset="100%" stop-color="#f0d3bc"/>
    </radialGradient>
    <linearGradient id="fur-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a35636"/>
      <stop offset="100%" stop-color="#7d3f24"/>
    </linearGradient>
    <linearGradient id="belly-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c4a2"/>
      <stop offset="100%" stop-color="#d4a87f"/>
    </linearGradient>
  </defs>

  <!-- Fond rond -->
  <circle cx="100" cy="100" r="98" fill="url(#bg-grad)"/>

  <!-- Corps (ovale) -->
  <ellipse cx="100" cy="135" rx="55" ry="50" fill="url(#fur-grad)"/>

  <!-- Ventre clair -->
  <ellipse cx="100" cy="145" rx="38" ry="36" fill="url(#belly-grad)" opacity="0.8"/>

  <!-- Tête (sphère) -->
  <circle cx="100" cy="88" r="42" fill="url(#fur-grad)"/>

  <!-- Joues / museau clair -->
  <ellipse cx="100" cy="105" rx="22" ry="16" fill="url(#belly-grad)" opacity="0.9"/>

  <!-- Petites oreilles -->
  <circle cx="72" cy="62" r="9" fill="#7d3f24"/>
  <circle cx="128" cy="62" r="9" fill="#7d3f24"/>
  <circle cx="72" cy="62" r="4" fill="#5c2c17"/>
  <circle cx="128" cy="62" r="4" fill="#5c2c17"/>

  <!-- Yeux ronds expressifs -->
  <ellipse cx="85" cy="86" rx="6" ry="7" fill="#1a1a1a"/>
  <ellipse cx="115" cy="86" rx="6" ry="7" fill="#1a1a1a"/>
  <!-- Petits points blancs (vivacité) -->
  <circle cx="87" cy="84" r="2" fill="#ffffff"/>
  <circle cx="117" cy="84" r="2" fill="#ffffff"/>

  <!-- Petit nez triangulaire -->
  <ellipse cx="100" cy="104" rx="4" ry="3" fill="#1a1a1a"/>

  <!-- Bouche : petit sourire en V -->
  <path d="M 92 113 Q 100 119 108 113" stroke="#1a1a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Moustaches subtiles -->
  <line x1="70" y1="108" x2="55" y2="105" stroke="#7d3f24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="70" y1="113" x2="56" y2="115" stroke="#7d3f24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="130" y1="108" x2="145" y2="105" stroke="#7d3f24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="130" y1="113" x2="144" y2="115" stroke="#7d3f24" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Petite étoile / spark (touche geek) -->
  <g transform="translate(155, 55)" opacity="0.6">
    <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="#c75d3a"/>
  </g>
  <g transform="translate(40, 40)" opacity="0.4">
    <path d="M 0 -5 L 1 -1 L 5 0 L 1 1 L 0 5 L -1 1 L -5 0 L -1 -1 Z" fill="#c75d3a"/>
  </g>

  <!-- Petites pattes qui dépassent -->
  <ellipse cx="78" cy="180" rx="9" ry="6" fill="#7d3f24"/>
  <ellipse cx="122" cy="180" rx="9" ry="6" fill="#7d3f24"/>
</svg>
