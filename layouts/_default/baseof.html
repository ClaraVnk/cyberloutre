<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if eq .Title site.Title }}{{ site.Title }}{{ else }}{{ .Title }} — {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ site.Params.description }}">
  <meta name="author" content="{{ site.Params.author }}">
  <meta property="og:site_name" content="cyberloutre.fr">
  <meta property="og:title" content="{{ site.Title }}">
  <meta property="og:description" content="{{ site.Params.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:image" content="{{ "/img/og-image.png" | absURL }}">
  <meta property="og:image:secure_url" content="{{ "/img/og-image.png" | absURL }}">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Loutre — médecin de jour, codeuse de nuit">
  <meta property="og:locale" content="fr_FR">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ site.Title }}">
  <meta name="twitter:description" content="{{ site.Params.description }}">
  <meta name="twitter:image" content="{{ "/img/og-image.png" | absURL }}">
  <meta name="twitter:image:alt" content="Loutre — médecin de jour, codeuse de nuit">

  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  {{ with resources.Get "css/main.css" }}
    {{ with . | minify | fingerprint }}
      <link rel="stylesheet" href="{{ .RelPermalink }}" integrity="{{ .Data.Integrity }}">
    {{ end }}
  {{ end }}
</head>
<body>
  {{ block "main" . }}{{ end }}
</body>
</html>
